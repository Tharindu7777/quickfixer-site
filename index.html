<!DOCTYPE html>
<html>
<head>
<title>QuickFixer</title>

<style>
body{
background: linear-gradient(135deg,#020617,#0f172a);
font-family: Arial;
color:white;
text-align:center;
padding:40px;
}

h1{
font-size:55px;
background: linear-gradient(90deg,#22c55e,#06b6d4,#a855f7);
-webkit-background-clip:text;
color:transparent;
}

.card{
background:#111827;
padding:35px;
border-radius:25px;
width:420px;
margin:auto;
box-shadow:0 0 40px #06b6d4;
}

textarea{
width:92%;
height:130px;
border-radius:12px;
border:none;
padding:12px;
font-size:15px;
}

button{
background:linear-gradient(90deg,#22c55e,#06b6d4);
border:none;
padding:14px 30px;
border-radius:12px;
color:white;
font-size:17px;
margin-top:12px;
cursor:pointer;
}
</style>
</head>

<body>

<h1>QuickFixer</h1>

<div class="card">

<h2>AI Rewrite Tool</h2>

<textarea placeholder="Paste your text here..."></textarea>
<br>

<button>Rewrite Text</button>

</div>

</body>
</html>
